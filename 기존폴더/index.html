<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SPA Portfolio</title>

    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
</head>

<body>

    <nav class="spa-nav">
        <div class="nav-buttons">
            <button data-page="home">홈</button>
            <button data-page="portfolio">포트폴리오</button>
            <button data-page="contact">연락처</button>
        </div>

        <!-- Material Switch: input + sibling span 구조 -->
        <label class="theme-switch" aria-label="토글 다크 모드">
            <input type="checkbox" id="theme-toggle" />
            <span class="md-track" role="switch" aria-checked="false"></span>
        </label>
    </nav>

    <main id="app" class="layout-container"></main>

</body>

</html>
